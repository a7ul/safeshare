# HTTPRoute — use this instead of ingress.yaml if your cluster uses
# the Gateway API (GKE Autopilot, Istio, Envoy Gateway, etc.)
#
# Prerequisites:
#   kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/latest/download/standard-install.yaml
#   # Then provision a Gateway (example below uses GKE's managed gateway class)

---
# Gateway — provision once per cluster (or reuse an existing one)
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: secureshare-gateway
  namespace: secureshare
  annotations:
    # GKE managed certificates — replace with your domain
    networking.gke.io/managed-certificates: secureshare-cert
spec:
  gatewayClassName: gke-l7-global-external-managed  # GKE; use "istio" for Istio, etc.
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: secureshare-tls   # created by cert-manager or cloud provider
    - name: http
      protocol: HTTP
      port: 80

---
# HTTPRoute — route all traffic to the secureshare Service
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: secureshare
  namespace: secureshare
spec:
  parentRefs:
    - name: secureshare-gateway
  hostnames:
    - share.example.com   # Replace with your domain
  rules:
    # Redirect HTTP to HTTPS
    - matches:
        - headers:
            - type: Exact
              name: x-forwarded-proto
              value: http
      filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
            statusCode: 301
    # Allow large request bodies for TUS uploads (timeout extension for slow connections)
    - matches:
        - path:
            type: PathPrefix
            value: /upload
      backendRefs:
        - name: secureshare
          port: 80
      timeouts:
        request: 300s
        backendRequest: 300s
    # All other traffic
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: secureshare
          port: 80
