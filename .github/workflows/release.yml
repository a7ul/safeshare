name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  build-binaries:
    name: Build ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            label: linux-x64
            output: secureshare-linux-x64
          - target: aarch64-unknown-linux-gnu
            label: linux-arm64
            output: secureshare-linux-arm64
          - target: x86_64-pc-windows-msvc
            label: windows-x64
            output: secureshare-windows-x64.exe
          - target: x86_64-apple-darwin
            label: macos-x64
            output: secureshare-macos-x64
          - target: aarch64-apple-darwin
            label: macos-arm64
            output: secureshare-macos-arm64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Compile binary (${{ matrix.label }})
        run: |
          deno compile \
            --allow-read --allow-write --allow-net --allow-env \
            --target ${{ matrix.target }} \
            --output ${{ matrix.output }} \
            main.ts

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: ${{ matrix.output }}

  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build-binaries

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist/ -type f -exec cp {} release/ \;
          ls -lh release/

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          name: SecureShare ${{ github.ref_name }}
          body: |
            ## SecureShare ${{ github.ref_name }}

            End-to-end encrypted file and note sharing.

            ### Install

            Download the binary for your platform, make it executable, and run:

            ```bash
            # Linux (x64)
            chmod +x secureshare-linux-x64
            STORAGE_DIR=/var/lib/secureshare ./secureshare-linux-x64

            # macOS (Apple Silicon)
            chmod +x secureshare-macos-arm64
            STORAGE_DIR=/var/lib/secureshare ./secureshare-macos-arm64
            ```

            The server starts on port `8000` by default.

            ### Environment variables

            | Variable | Default | Description |
            |---|---|---|
            | `PORT` | `8000` | HTTP listen port |
            | `STORAGE_DIR` | `/tmp/e2eshare` | Upload storage directory |
            | `LINK_TTL_DAYS` | `30` | Maximum link lifetime in days |
            | `LOGO_URL` | _(blank)_ | Company logo URL |
            | `TITLE` | _(blank)_ | Company name shown in the UI |

            ### Docker

            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            docker run -p 8000:8000 -v /data/secureshare:/data \
              -e STORAGE_DIR=/data \
              ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```

            See the [deploy/](https://github.com/${{ github.repository }}/tree/main/deploy) directory for Docker Compose, Kubernetes, and other deployment recipes.
          files: release/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  docker-release:
    name: Push versioned Docker image
    runs-on: ubuntu-latest
    needs: build-binaries

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
